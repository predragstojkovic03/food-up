version: '3.8'

services:
  app:
    image: food-up-app-prod:1.0.0
    build:
      context: .
      dockerfile: Dockerfile.prod
      target: production
    restart: unless-stopped
    deploy:
      replicas: ${APP_REPLICAS:-2}
    environment:
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_PORT: ${POSTGRES_PORT}
      DB_HOST: postgres
      NODE_ENV: production
      PORT: ${SERVER_PORT}
      ORM_SYNC: false
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_EXPIRY: ${JWT_ACCESS_EXPIRY}
      JWT_REFRESH_EXPIRY_DAYS: ${JWT_REFRESH_EXPIRY_DAYS}
      MAIL_FROM: ${MAIL_FROM}
      WEB_APP_URL: ${WEB_APP_URL}
      RESEND_API_KEY: ${RESEND_API_KEY}
      OTEL_SERVICE_NAME: food-up
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-lgtm:4318
      VIRTUAL_HOST: ${DOMAIN}
      VIRTUAL_PORT: 3000
      LETSENCRYPT_HOST: ${DOMAIN}
      LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL}
    networks:
      - shared-network
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_started
      otel-lgtm:
        condition: service_started

  postgres:
    image: postgres:17.4-alpine
    container_name: food-up-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    networks:
      - shared-network
    volumes:
      - pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    image: migrate/migrate:latest
    volumes:
      - ./apps/server/migrations:/migrations
    command:
      - "-path=/migrations"
      - "-database=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:${POSTGRES_PORT}/${POSTGRES_DB}?sslmode=disable"
      - "up"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - shared-network

  redis:
    image: redis:8-alpine
    container_name: food-up-redis
    restart: unless-stopped
    networks:
      - shared-network
    volumes:
      - redis:/data

  otel-lgtm:
    image: grafana/otel-lgtm:latest
    container_name: food-up-otel-lgtm
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
    ports:
      - "127.0.0.1:3001:3000"
    volumes:
      - otel-lgtm:/data
      - ./grafana/provisioning/food-up-dashboards.yaml:/otel-lgtm/grafana/conf/provisioning/dashboards/food-up-dashboards.yaml:ro
      - ./grafana/dashboards:/otel-lgtm/grafana/dashboards:ro
    networks:
      - shared-network

  nginx-proxy:
    image: nginxproxy/nginx-proxy:alpine
    container_name: nginx-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - nginx-certs:/etc/nginx/certs
      - nginx-vhost:/etc/nginx/vhost.d
      - nginx-html:/usr/share/nginx/html
      - /var/run/docker.sock:/tmp/docker.sock:ro
    networks:
      - shared-network

  nginx-proxy-acme:
    image: nginxproxy/acme-companion
    container_name: nginx-proxy-acme
    restart: unless-stopped
    environment:
      NGINX_PROXY_CONTAINER: nginx-proxy
      DEFAULT_EMAIL: ${LETSENCRYPT_EMAIL}
    volumes:
      - nginx-certs:/etc/nginx/certs
      - nginx-vhost:/etc/nginx/vhost.d
      - nginx-html:/usr/share/nginx/html
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - shared-network
    depends_on:
      - nginx-proxy

  autoheal:
    image: willfarrell/autoheal:latest
    container_name: food-up-autoheal
    restart: unless-stopped
    environment:
      AUTOHEAL_CONTAINER_LABEL: all
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

networks:
  shared-network:

volumes:
  pg:
    driver: local
  redis:
    driver: local
  nginx-certs:
    driver: local
  nginx-vhost:
    driver: local
  nginx-html:
    driver: local
  otel-lgtm:
    driver: local
