version: '3.8'

services:
  app:
    container_name: food-up-app
    restart: unless-stopped
    image: food-up-app-dev:1.0.0
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
      - /usr/src/app/shared/dist
    build:
      context: .
      target: development
      dockerfile: Dockerfile
    ports:
      - ${SERVER_PORT}:${SERVER_PORT}
      - ${WEB_PORT}:${WEB_PORT}
    networks:
      - shared-network
    depends_on:
      - postgres
      - redis
      - otel-lgtm
    environment:
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_PORT: ${POSTGRES_PORT}
      DB_HOST: postgres
      NODE_ENV: ${NODE_ENV}
      PORT: ${SERVER_PORT}
      ORM_SYNC: ${ORM_SYNC}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MAIL_FROM: ${MAIL_FROM}
      WEB_APP_URL: ${WEB_APP_URL}
      OTEL_SERVICE_NAME: food-up
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-lgtm:4318
    env_file:
      - .env

  postgres:
    image: postgres:17.4-alpine
    container_name: food-up-postgres
    ports:
      - ${POSTGRES_PORT}:${POSTGRES_PORT}
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    networks:
      - shared-network
    volumes:
      - pg:/var/lib/postgresql/data
    env_file:
      - .env

  redis:
    image: redis:8-alpine
    container_name: food-up-redis
    ports:
      - '6379:6379'
    networks:
      - shared-network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: food-up-pgadmin
    restart: unless-stopped
    ports:
      - '5050:80'
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    networks:
      - shared-network
    volumes:
      - pgadmin:/var/lib/pgadmin
    depends_on:
      - postgres

  otel-lgtm:
    image: grafana/otel-lgtm:latest
    container_name: food-up-otel-lgtm
    restart: unless-stopped
    ports:
      - '3001:3000'
      - '4317:4317'
      - '4318:4318'
    volumes:
      - ./grafana/provisioning/food-up-dashboards.yaml:/otel-lgtm/grafana/conf/provisioning/dashboards/food-up-dashboards.yaml:ro
      - ./grafana/dashboards:/otel-lgtm/grafana/dashboards:ro
    networks:
      - shared-network

networks:
  shared-network:

volumes:
  pg:
    driver: local
  pgadmin:
    driver: local
